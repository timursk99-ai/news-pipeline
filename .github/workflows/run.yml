name: Run News Script

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show workspace debug
        run: |
          echo "PWD: $(pwd)"
          ls -la

      - name: Run script
        env:
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
        run: python script.py

      - name: Show CSV contents debug
        run: |
          if [ -f news_data.csv ]; then
            echo "news_data.csv head:"
            head -n 20 news_data.csv || true
            echo "lines:"
            wc -l news_data.csv || true
          else
            echo "news_data.csv not found"
          fi

      - name: Commit updated CSV safe
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          if [ -f news_data.csv ]; then
            git add news_data.csv
            if ! git diff --cached --quiet; then
              git commit -m "update data"
              git push
            else
              echo "news_data.csv exists but no changes to commit"
            fi
          else
            echo "news_data.csv not found; skipping commit"
          fi
