name: Run News Script

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: MiniMax smoke test (fast)
        env:
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
        run: |
          python - <<'PY'
          import os, requests, json
          HF_API_KEY = os.environ.get("HF_API_KEY")
          if not HF_API_KEY:
            print("HF_API_KEY not set; smoke test skipped")
            raise SystemExit(0)
          headers = {"Authorization": f"Bearer {HF_API_KEY}"}
          endpoint = "https://api-inference.huggingface.co/models/MiniMaxAI/MiniMax-M2.5"
          prompt = "Return a JSON object with keys summary, sentiment_label, sentiment_score for the text: 'Apple reports strong quarterly revenue.'"
          r = requests.post(endpoint, headers=headers, json={"inputs": prompt, "options": {"wait_for_model": True}}, timeout=60)
          print("status:", r.status_code)
          try:
            print("response:", r.json())
          except Exception:
            print("text:", r.text[:2000])
          PY

  run-script:
    needs: smoke-test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug environment (optional)
        run: |
          echo "Python: $(python --version)"
          echo "Workspace:"
          pwd
          ls -la
          if [ -f tickers.txt ]; then
            echo "tickers.txt:"
            cat tickers.txt
          else
            echo "tickers.txt missing"
          fi

      - name: Run script
        env:
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
        run: |
          set -o pipefail
          python -u script.py

      - name: Show CSVs (debug)
        run: |
          echo "CSV files in workspace:"
          ls -1 news_*.csv || echo "no news CSVs yet"
          for f in news_*.csv; do
            echo "---- $f ----"
            head -n 10 "$f" || true
            echo "lines: $(wc -l < "$f" 2>/dev/null || echo 0)"
          done

      - name: Commit updated CSVs (robust)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git config --global user.name "bot"
          git config --global user.email "bot@github.com"

          git checkout -q "$BRANCH" || true

          if [ -n "${GITHUB_TOKEN:-}" ]; then
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          fi

          shopt -s nullglob
          files=(news_*.csv)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No news_*.csv files to commit; exiting"
            exit 0
          fi

          git add "${files[@]}"

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git fetch origin "$BRANCH"

          if git rev-parse --verify "origin/$BRANCH" >/dev/null 2>&1; then
            echo "Rebasing on top of origin/$BRANCH"
            git commit -m "update news CSVs" || true
            if ! git rebase "origin/$BRANCH"; then
              echo "Rebase failed — aborting and exiting"
              git rebase --abort || true
              exit 1
            fi
          else
            git commit -m "update news CSVs" || true
          fi

          if git push origin "HEAD:$BRANCH"; then
            echo "Pushed changes to origin/$BRANCH"
          else
            echo "Push failed. Attempting safe force-with-lease"
            git push --force-with-lease origin "HEAD:$BRANCH"
          fi
