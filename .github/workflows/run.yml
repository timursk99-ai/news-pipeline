name: Run News Script

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug environment (optional)
        run: |
          echo "Python: $(python --version)"
          echo "Workspace:"
          pwd
          ls -la
          if [ -f tickers.txt ]; then
            echo "tickers.txt:"
            cat tickers.txt
          else
            echo "tickers.txt missing"
          fi

      - name: Run script
        env:
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
        run: |
          set -o pipefail
          python -u script.py

      - name: Show CSV contents (debug)
        run: |
          if [ -f news_data.csv ]; then
            echo "news_data.csv head:"
            head -n 20 news_data.csv || true
            echo "lines:"
            wc -l news_data.csv || true
          else
            echo "news_data.csv not found"
          fi

      - name: Commit updated CSV (robust)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git config --global user.name "bot"
          git config --global user.email "bot@github.com"

          # Ensure we are on the checked-out branch
          git checkout -q "$BRANCH" || true

          # Use token for authenticated push/pull if available
          if [ -n "${GITHUB_TOKEN:-}" ]; then
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          fi

          # Only proceed if the CSV exists
          if [ ! -f news_data.csv ]; then
            echo "news_data.csv not found; skipping commit"
            exit 0
          fi

          # Stage file
          git add news_data.csv

          # If nothing staged, skip
          if git diff --cached --quiet; then
            echo "news_data.csv exists but no changes to commit"
            exit 0
          fi

          # Fetch remote and rebase local staged changes on top of remote branch
          git fetch origin "$BRANCH"

          if git rev-parse --verify "origin/$BRANCH" >/dev/null 2>&1; then
            echo "Rebasing on top of origin/$BRANCH"
            git commit -m "update data" || true
            if ! git rebase "origin/$BRANCH"; then
              echo "Rebase failed — aborting rebase and exiting without push"
              git rebase --abort || true
              exit 1
            fi
          else
            git commit -m "update data" || true
          fi

          # Push the rebased commit
          if git push origin "HEAD:$BRANCH"; then
            echo "Pushed changes to origin/$BRANCH"
          else
            echo "Push failed. Attempting safe force-with-lease as last resort"
            git push --force-with-lease origin "HEAD:$BRANCH"
          fi
